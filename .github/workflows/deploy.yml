name: Deploy to Firebase

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Firebase secrets
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing secret: FIREBASE_PROJECT_ID"
            exit 1
          fi

          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "Missing secret: FIREBASE_TOKEN"
            exit 1
          fi

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_URL: ${{ secrets.VITE_GAME_URL }}
        run: npm run build

      - name: Deploy
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npx firebase-tools deploy --project "$FIREBASE_PROJECT_ID" --non-interactive
